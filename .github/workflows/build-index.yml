name: Build posts index

on:
  push:
    branches: [ main ]
    paths: [ 'posts/**' ]   # only run when a post is added/changed

jobs:
  build:
    runs-on: ubuntu-latest

    # Give the workflow write permission to push back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install gray-matter
        run: npm install gray-matter

      - name: Generate posts.json
        run: node generate-index.js

      - name: Commit and push posts.json (if changed)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add posts.json

          # If no changes, exit gracefully
          if git diff --cached --quiet; then
            echo "No changes to posts.json – nothing to commit."
            exit 0
          fi

          # Commit the updated posts.json
          git commit -m "auto‑update posts.json"

          # Pull any remote changes (e.g., a commit from the CMS) and rebase our commit on top
          git fetch origin main
          git rebase origin/main

          # Push the result
          git push origin main
