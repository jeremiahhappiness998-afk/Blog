name: Build posts index

on:
  push:
    branches: [ main ]
    paths: [ 'posts/**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install gray-matter
      - run: node generate-index.js

      - name: Commit & push posts.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add posts.json

          # Exit if no changes
          if git diff --cached --quiet; then
            echo "No changes to posts.json – exiting"
            exit 0
          fi

          # Commit the changes
          git commit -m "auto‑update posts.json"

          # Fetch latest remote changes and rebase
          git fetch origin main
          git rebase origin/main

          # Push the result
          git push origin main
