name: Build posts index

on:
  push:
    branches: [ main ]
    paths: [ 'posts/**' ]  # only run when posts change

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install gray-matter  # install required package
      - run: node generate-index.js
      - name: Commit & push posts.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add posts.json
          # Check if there's anything to commit
          if git diff --cached --quiet; then
            echo "No changes to posts.json – exiting"
            exit 0
          fi
          git commit -m "auto‑update posts.json"
          # Pull latest changes from the same branch, rebasing our commit on top
          git pull --rebase origin ${{ github.ref_name }}
          # Push the updated commit
          git push
