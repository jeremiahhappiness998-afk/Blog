<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blogger‑style Blog</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/custom.css">
    <!-- Meta tags for SEO (example) -->
    <meta name="description" content="A clean blog inspired by Blogger.com">
</head>
<body>
    <!-- Navigation (Blogger.com simple style) -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">My Blog</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-5">
        <div class="row">
            <div class="col-lg-8">
                <h1 class="mb-4">Recent Posts</h1>
                <div id="post-list" class="row g-4">
                    <!-- Posts will be injected here by main.js -->
                </div>
            </div>
            <!-- Optional sidebar (Blogger.com often has one) -->
            <aside class="col-lg-4">
                <div class="bg-light p-4 rounded">
                    <h5>About</h5>
                    <p>A simple blog built with Bootstrap and a headless CMS.</p>
                </div>
            </aside>
        </div>
    </main>

    <footer class="border-top py-4 text-center text-muted">
        <div class="container">© 2025 My Blog</div>
    </footer>

    <!-- Bootstrap JS (for responsive toggler) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Our main script -->
    <script src="js/main.js"></script>
</body>
</html>
