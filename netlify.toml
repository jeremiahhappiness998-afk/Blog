[build]
  publish = "."          # your site root (where index.html lives)

# Redirect for Decap CMS authentication (required for Git Gateway)
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# Optional: Add security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"