<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>About</title>
</head>
<body>
    <<!-- inside about.html -->
<div id="page-content"></div>

<script>
    fetch('/pages/about.md')
        .then(res => res.text())
        .then(markdown => {
            const { attributes, body } = frontMatter(markdown);
            document.getElementById('page-content').innerHTML = `
                <h1>${attributes.title}</h1>
                <div class="page-body">${marked.parse(body)}</div>
            `;
        });
</script>
</body>
</html>
